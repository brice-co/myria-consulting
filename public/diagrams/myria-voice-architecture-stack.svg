<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" role="img" aria-label="Myria Voice AI First Architecture Stack">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="55%" stop-color="#0A0A0A"/>
      <stop offset="100%" stop-color="#060606"/>
    </linearGradient>

    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="55%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="brandSoft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.14"/>
      <stop offset="55%" stop-color="#22D3EE" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.12"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000000" flood-opacity="0.55"/>
    </filter>

    <filter id="softGlow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <style>
      .title { font: 800 44px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #F9FAFB; letter-spacing: -0.02em; }
      .subtitle { font: 500 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #A3A3A3; }
      .h { font: 800 18px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #F9FAFB; letter-spacing: -0.01em; }
      .t { font: 500 15px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; fill: #BDBDBD; }
      .mono { font: 700 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #D1D5DB; }
      .chip { font: 700 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; fill: #E5E7EB; }
      .card { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.10); }
      .cardSoft { fill: rgba(255,255,255,0.03); stroke: rgba(255,255,255,0.08); }
      .divider { stroke: rgba(255,255,255,0.10); }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1200" height="1600" fill="url(#bg)"/>

  <!-- Ambient brand glow -->
  <ellipse cx="220" cy="220" rx="320" ry="220" fill="url(#brandSoft)" opacity="0.75"/>
  <ellipse cx="980" cy="320" rx="360" ry="260" fill="url(#brandSoft)" opacity="0.45"/>
  <ellipse cx="680" cy="1460" rx="640" ry="280" fill="url(#brandSoft)" opacity="0.25"/>

  <!-- Header -->
  <g transform="translate(90,110)">
    <text class="title" x="0" y="0">Myria Voice AI First Architecture</text>
    <text class="subtitle" x="0" y="40">Voice-first entry point → governed control plane → production systems that scale</text>

    <g transform="translate(0,70)">
      <rect x="0" y="0" rx="16" ry="16" width="820" height="52" class="cardSoft"/>
      <rect x="16" y="14" rx="10" ry="10" width="168" height="24" fill="rgba(16,185,129,0.16)" stroke="rgba(16,185,129,0.35)"/>
      <text class="chip" x="30" y="32">consulting-first</text>

      <rect x="198" y="14" rx="10" ry="10" width="208" height="24" fill="rgba(34,211,238,0.14)" stroke="rgba(34,211,238,0.30)"/>
      <text class="chip" x="212" y="32">voice as entry point</text>

      <rect x="420" y="14" rx="10" ry="10" width="260" height="24" fill="rgba(139,92,246,0.14)" stroke="rgba(139,92,246,0.30)"/>
      <text class="chip" x="434" y="32">governance by design</text>
    </g>
  </g>

  <!-- Stack container -->
  <g transform="translate(140,260)" filter="url(#shadow)">
    <rect x="0" y="0" rx="26" ry="26" width="920" height="1230" class="card"/>
  </g>

  <!-- Stack title band -->
  <g transform="translate(140,260)">
    <rect x="0" y="0" rx="26" ry="26" width="920" height="110" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)"/>
    <g transform="translate(36,42)">
      <text class="h" x="0" y="0">Architecture Stack</text>
      <text class="t" x="0" y="28">Six layers that turn voice into secure, operational intelligence</text>
    </g>

    <!-- Brand line -->
    <rect x="36" y="94" width="848" height="3" fill="url(#brand)" opacity="0.95"/>
  </g>

  <!-- Layer cards -->
  <!-- Helper geometry -->
  <!-- Each layer card: x=190, w=820, h=170, gap=26 -->
  <!-- Start y = 410 -->
  <!-- Layer 1 -->
  <g transform="translate(190,410)">
    <rect x="0" y="0" rx="22" ry="22" width="820" height="170" fill="rgba(16,185,129,0.06)" stroke="rgba(16,185,129,0.30)"/>
    <text class="mono" x="26" y="42">01 — Voice Interface Layer</text>
    <text class="h" x="26" y="74">Human Conversation as the Entry Point</text>
    <text class="t" x="26" y="104">Browser Voice MVP • WebRTC realtime voice • transcript UI • UX state</text>

    <g transform="translate(26,122)">
      <rect x="0" y="0" rx="12" ry="12" width="250" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="14" y="22">start simple, prove value</text>

      <rect x="268" y="0" rx="12" ry="12" width="230" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="282" y="22">voice-first experience</text>
    </g>
  </g>

  <!-- Layer 2 -->
  <g transform="translate(190,606)">
    <rect x="0" y="0" rx="22" ry="22" width="820" height="170" fill="rgba(34,211,238,0.055)" stroke="rgba(34,211,238,0.26)"/>
    <text class="mono" x="26" y="42">02 — Realtime Intelligence Layer</text>
    <text class="h" x="26" y="74">Low-Latency Speech Reasoning Pipeline</text>
    <text class="t" x="26" y="104">STT ↔ LLM ↔ TTS • streaming events • interruptions (barge-in) in realtime tier</text>

    <g transform="translate(26,122)">
      <rect x="0" y="0" rx="12" ry="12" width="240" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="14" y="22">tiered voice options</text>

      <rect x="258" y="0" rx="12" ry="12" width="280" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="272" y="22">ultra-low latency when needed</text>
    </g>
  </g>

  <!-- Layer 3 -->
  <g transform="translate(190,802)">
    <rect x="0" y="0" rx="22" ry="22" width="820" height="170" fill="rgba(139,92,246,0.055)" stroke="rgba(139,92,246,0.26)"/>
    <text class="mono" x="26" y="42">03 — Control Plane (Governance)</text>
    <text class="h" x="26" y="74">Secure Orchestration and Policy</text>
    <text class="t" x="26" y="104">Ephemeral token minting • session rules • intent routing • tool permissions</text>

    <g transform="translate(26,122)">
      <rect x="0" y="0" rx="12" ry="12" width="250" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="14" y="22">server-side control</text>

      <rect x="268" y="0" rx="12" ry="12" width="270" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="282" y="22">governed AI (not a demo)</text>
    </g>
  </g>

  <!-- Layer 4 -->
  <g transform="translate(190,998)">
    <rect x="0" y="0" rx="22" ry="22" width="820" height="170" fill="rgba(255,255,255,0.035)" stroke="rgba(255,255,255,0.10)"/>
    <text class="mono" x="26" y="42">04 — Tool Execution Layer</text>
    <text class="h" x="26" y="74">Server-Side Actions Only</text>
    <text class="t" x="26" y="104">Calendar • email • CRM • webhooks • internal APIs (secrets stay on server)</text>

    <g transform="translate(26,122)">
      <rect x="0" y="0" rx="12" ry="12" width="220" height="32" fill="rgba(16,185,129,0.14)" stroke="rgba(16,185,129,0.28)"/>
      <text class="chip" x="14" y="22">real operations</text>

      <rect x="238" y="0" rx="12" ry="12" width="330" height="32" fill="rgba(34,211,238,0.12)" stroke="rgba(34,211,238,0.25)"/>
      <text class="chip" x="252" y="22">integration-driven ROI</text>
    </g>
  </g>

  <!-- Layer 5 -->
  <g transform="translate(190,1194)">
    <rect x="0" y="0" rx="22" ry="22" width="820" height="170" fill="rgba(16,185,129,0.045)" stroke="rgba(16,185,129,0.22)"/>
    <text class="mono" x="26" y="42">05 — Multi-Tenant Platform Core</text>
    <text class="h" x="26" y="74">Workspace Isolation and RBAC</text>
    <text class="t" x="26" y="104">Workspaces → agents → tools → data • tenant A/B isolation • role-based access</text>

    <g transform="translate(26,122)">
      <rect x="0" y="0" rx="12" ry="12" width="280" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="14" y="22">scale without cross-access</text>

      <rect x="298" y="0" rx="12" ry="12" width="230" height="32" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.10)"/>
      <text class="chip" x="312" y="22">clean boundaries</text>
    </g>
  </g>

  <!-- Layer 6 -->
  <g transform="translate(190,1390)">
    <rect x="0" y="0" rx="22" ry="22" width="820" height="170" fill="rgba(139,92,246,0.045)" stroke="rgba(139,92,246,0.22)"/>
    <text class="mono" x="26" y="42">06 — Security and Observability</text>
    <text class="h" x="26" y="74">Auditability, Monitoring, Compliance Mindset</text>
    <text class="t" x="26" y="104">Intent logs • call summaries • usage metrics • access audits • SOC2-ready patterns</text>

    <g transform="translate(26,122)">
      <rect x="0" y="0" rx="12" ry="12" width="260" height="32" fill="rgba(139,92,246,0.12)" stroke="rgba(139,92,246,0.25)"/>
      <text class="chip" x="14" y="22">trust &amp; governance</text>

      <rect x="278" y="0" rx="12" ry="12" width="260" height="32" fill="rgba(34,211,238,0.10)" stroke="rgba(34,211,238,0.22)"/>
      <text class="chip" x="292" y="22">production discipline</text>
    </g>
  </g>

  <!-- Footer -->
  <g transform="translate(140,1520)">
    <line x1="0" y1="0" x2="920" y2="0" class="divider" stroke-width="1"/>
    <text class="subtitle" x="0" y="48">Myria Consulting — Boutique AI transformation partner • Voice-first systems • Governed foundations</text>
  </g>
</svg>
