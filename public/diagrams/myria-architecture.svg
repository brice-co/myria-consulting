<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1000" viewBox="0 0 1600 1000" role="img" aria-label="Myria Technical Architecture Diagram">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050505"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>

    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="50%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>

    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#9CA3AF"/>
    </marker>

    <marker id="arrowBrand" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#22D3EE"/>
    </marker>

    <style>
      .title { font: 700 28px system-ui; fill: #F9FAFB; }
      .subtitle { font: 500 14px system-ui; fill: #9CA3AF; }
      .h { font: 700 16px system-ui; fill: #F9FAFB; }
      .t { font: 500 13px system-ui; fill: #A3A3A3; }
      .mono { font: 600 12px monospace; fill: #D1D5DB; }
      .card { fill: rgba(255,255,255,0.04); stroke: rgba(255,255,255,0.12); }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="url(#bg)"/>

  <!-- Header -->
  <text x="80" y="80" class="title">Myria Voice Platform Architecture</text>
  <text x="80" y="110" class="subtitle">
    WebRTC Realtime • Secure Control Plane • Multi-Tenant AI Platform • Server-Side Tooling
  </text>

  <!-- CLIENT -->
  <rect x="80" y="160" rx="18" ry="18" width="420" height="300" class="card"/>
  <text x="110" y="195" class="h">Client (Browser)</text>
  <text x="110" y="220" class="t">Next.js App Router • Client Components</text>

  <rect x="110" y="250" rx="14" ry="14" width="360" height="80" class="card"/>
  <text x="130" y="280" class="mono">MyriaWidget</text>
  <text x="130" y="300" class="t">Voice UI • Transcript • Intent Triggers</text>

  <rect x="110" y="350" rx="14" ry="14" width="360" height="80" class="card"/>
  <text x="130" y="380" class="mono">WebRTC</text>
  <text x="130" y="400" class="t">Audio stream + oai-events data channel</text>

  <!-- OPENAI REALTIME -->
  <rect x="590" y="160" rx="18" ry="18" width="420" height="300" class="card"/>
  <text x="620" y="195" class="h">OpenAI Realtime API</text>
  <text x="620" y="220" class="t">Low-latency voice reasoning</text>

  <rect x="620" y="250" rx="14" ry="14" width="360" height="80" fill="rgba(34,211,238,0.08)" stroke="rgba(34,211,238,0.3)"/>
  <text x="640" y="280" class="mono">STT → LLM → TTS</text>
  <text x="640" y="300" class="t">Streaming audio responses</text>

  <rect x="620" y="350" rx="14" ry="14" width="360" height="80" fill="rgba(139,92,246,0.08)" stroke="rgba(139,92,246,0.3)"/>
  <text x="640" y="380" class="mono">Realtime Events</text>
  <text x="640" y="400" class="t">speech_started • transcript • response.done</text>

  <!-- CONTROL PLANE -->
  <rect x="1100" y="140" rx="18" ry="18" width="420" height="360" class="card"/>
  <text x="1130" y="175" class="h">Next.js Control Plane</text>
  <text x="1130" y="200" class="t">Server Actions • API Routes • Governance</text>

  <rect x="1130" y="230" rx="14" ry="14" width="360" height="70" fill="rgba(16,185,129,0.1)" stroke="rgba(16,185,129,0.35)"/>
  <text x="1150" y="260" class="mono">POST /api/realtime-session</text>
  <text x="1150" y="280" class="t">Mint ephemeral OpenAI token</text>

  <rect x="1130" y="315" rx="14" ry="14" width="360" height="70" class="card"/>
  <text x="1150" y="345" class="mono">POST /api/voice/intent</text>
  <text x="1150" y="365" class="t">Log high-signal actions</text>

  <rect x="1130" y="400" rx="14" ry="14" width="360" height="70" class="card"/>
  <text x="1150" y="430" class="mono">POST /api/voice/summary</text>
  <text x="1150" y="450" class="t">Summarize + email via Resend</text>

  <!-- PLATFORM CORE -->
  <rect x="80" y="520" rx="20" ry="20" width="1440" height="360"
        fill="rgba(255,255,255,0.035)"
        stroke="rgba(16,185,129,0.4)"/>

  <text x="110" y="560" class="h">AI Platform Core (Multi-Tenant)</text>
  <text x="110" y="585" class="t">Workspace → Agents → Tools → Data (RBAC enforced)</text>

  <!-- TENANT A -->
  <rect x="110" y="620" rx="16" ry="16" width="420" height="220"
        fill="rgba(16,185,129,0.07)"
        stroke="rgba(16,185,129,0.4)"/>
  <text x="130" y="655" class="mono">Tenant A</text>
  <text x="130" y="680" class="t">Isolated workspace</text>

  <text x="130" y="715" class="mono">Agents</text>
  <text x="130" y="735" class="t">sales • support • booking</text>

  <text x="130" y="775" class="mono">Tools</text>
  <text x="130" y="795" class="t">calendar • email • CRM</text>

  <!-- TENANT B -->
  <rect x="560" y="620" rx="16" ry="16" width="420" height="220"
        fill="rgba(34,211,238,0.06)"
        stroke="rgba(34,211,238,0.35)"/>
  <text x="580" y="655" class="mono">Tenant B</text>
  <text x="580" y="680" class="t">No shared state</text>

  <text x="580" y="715" class="mono">Agents</text>
  <text x="580" y="735" class="t">custom workflows</text>

  <text x="580" y="775" class="mono">Credentials</text>
  <text x="580" y="795" class="t">scoped per tenant</text>

  <!-- DATA -->
  <rect x="1010" y="620" rx="16" ry="16" width="480" height="220"
        fill="rgba(139,92,246,0.06)"
        stroke="rgba(139,92,246,0.35)"/>
  <text x="1030" y="655" class="mono">Data &amp; Observability</text>
  <text x="1030" y="680" class="t">Typed, auditable, tenant-safe</text>

  <text x="1030" y="715" class="mono">Neon Postgres</text>
  <text x="1030" y="735" class="t">multi-tenant schema</text>

  <text x="1030" y="775" class="mono">Drizzle ORM</text>
  <text x="1030" y="795" class="t">type-safe migrations</text>

  <!-- FLOWS -->
  <path d="M500 330 C 540 330, 560 330, 590 330"
        stroke="#22D3EE" stroke-width="3" fill="none" marker-end="url(#arrowBrand)"/>
  <text x="520" y="310" class="t" fill="#22D3EE">WebRTC stream</text>

  <path d="M500 210 C 760 80, 980 80, 1100 230"
        stroke="#9CA3AF" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="760" y="100" class="t">ephemeral token request</text>

  <path d="M1100 260 C 980 140, 760 140, 500 260"
        stroke="#9CA3AF" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="760" y="165" class="t">short-lived client_secret</text>

  <path d="M800 460 C 800 500, 800 520, 800 620"
        stroke="#22D3EE" stroke-width="2.5" fill="none" marker-end="url(#arrowBrand)"/>
  <text x="820" y="510" class="t" fill="#22D3EE">intents &amp; transcripts</text>

  <!-- FOOTER -->
  <text x="80" y="960" class="subtitle">
    Designed for production: isolation • RBAC • observability • secure tool execution • scalability
  </text>
</svg>
